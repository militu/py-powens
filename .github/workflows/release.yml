name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  quality:
    name: lint + typecheck + tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Install dependencies (lockfile)
        run: uv sync --frozen

      - name: Ruff lint
        run: uv run ruff check --output-format=github .

      - name: Ruff format (check)
        run: uv run ruff format --check .

      - name: Type check (mypy --strict)
        run: uv run mypy .

      - name: Run tests
        run: uv run pytest -q

  build:
    name: Build distributions
    runs-on: ubuntu-latest
    needs: [quality]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(python -c "import re,pathlib; print(re.search(r'__version__\s*=\s*\"([^\"]+)\"', pathlib.Path('src/powens/__init__.py').read_text()).group(1))")
          if [ "$TAG" != "$PKG" ]; then
            echo "Tag $TAG does not match src/powens/__init__.py version $PKG"
            exit 1
          fi

      - name: Build sdist + wheel
        run: uv build

      - name: Check distributions
        run: uv tool run twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI (Trusted Publisher / OIDC)
    runs-on: ubuntu-latest
    needs: [build]
    environment:
      name: pypi
      url: https://pypi.org/project/py-powens/
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [publish-pypi]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3.0.0
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
